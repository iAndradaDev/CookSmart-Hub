<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Donate - CookSmart Hub</title>
        <link rel="stylesheet" href="styles.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    </head>
    <body>
        <!-- Header & Logo Section -->
        <header class="header">
            <div class="header-container">
                <div class="logo">
                    <img src="logo.png" class="logo-pic" alt="Logo">
                </div>
                <nav class="navbar">
                    <a href="index.html">Home</a>
                    <a href="learning_materials.html">Learning Materials</a>
                    <a href="feedback.html">Feedback</a>
                    <a href="aboutus.html">About us</a>
                    <a href="donate.html">Donate</a>
                </nav>
            </div>
        </header>
        
        <!-- Main Body Container -->
        <main class="container">
            
            <!-- Donate Specific Header Section with Text-Wrap Elements -->
            <div class="resources-header donate-header-container">
                <h2 class="resources-title">Help us cook up something special.</h2>
                <p class="donate-subhead">Your generous support keeps our kitchen running and our educational materials completely free for everyone.</p>
            </div>

            <hr class="section-divider">

            <!-- GCash Image Display Area -->
            <div class="donate-card-container">
                <div class="gcash-card">
                    <h3 class="gcash-title">Scan to Donate via GCash</h3>
                    <div class="gcash-image-wrapper">
                        <!-- Replace 'gcash-qr.png' with the actual path to your QR code image later -->
                        <img src="gcash.png" alt="Scan GCash QR Code to Donate" class="gcash-qr-img">
                    </div>
                </div>
            </div>

        </main>
        
        <!-- Global Footer Section -->
        <footer class="footer">
            © 2026 CookSmart Hub. All rights reserved.
        </footer>
    </body>
</html>
