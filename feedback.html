<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Feedback - CookSmart Hub</title>
        <link rel="stylesheet" href="styles.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    </head>
    <body>
        <header class="header">
            <div class="header-container">
                <div class="logo">
                    <img src="logo.png" class="logo-pic" alt="Logo">
                </div>
                <nav class="navbar">
                    <a href="index.html">Home</a>
                    <a href="learning_materials.html">Learning Materials</a>
                    <a href="feedback.html">Feedback</a>
                    <a href="aboutus.html">About us</a>
                    <a href="donate.html">Donate</a>
                </nav>
            </div>
        </header>
        
        <main class="container">
            
            <div class="resources-header feedback-header-container">
                <h2 class="resources-title">We’re always kneading ways to improve.</h2>
                <p class="feedback-subhead">Tell us what made you smile or what you’d love to see more.</p>
            </div>

            <hr class="section-divider">

            <div class="feedback-form-container">
                <form id="feedbackForm" class="feedback-form">
                    
                    <div class="form-group">
                        <label for="email" class="form-label">Your Email Address</label>
                        <input type="email" id="email" name="email" class="form-input" placeholder="example@email.com" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">How do you feel about your experience? (1 = Disappointed, 5 = Excellent)</label>
                        <div class="rating-scale">
                            <label class="rating-option">
                                <input type="radio" name="rating" value="1" required>
                                <span class="rating-box">1</span>
                            </label>
                            <label class="rating-option">
                                <input type="radio" name="rating" value="2">
                                <span class="rating-box">2</span>
                            </label>
                            <label class="rating-option">
                                <input type="radio" name="rating" value="3">
                                <span class="rating-box">3</span>
                            </label>
                            <label class="rating-option">
                                <input type="radio" name="rating" value="4">
                                <span class="rating-box">4</span>
                            </label>
                            <label class="rating-option">
                                <input type="radio" name="rating" value="5">
                                <span class="rating-box">5</span>
                            </label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="reason" class="form-label">What is the reason for your rating?</label>
                        <textarea id="reason" name="reason" class="form-textarea" placeholder="Share your thoughts, critiques, or suggestions here..." rows="5" required></textarea>
                    </div>

                    <div class="form-action">
                        <button type="submit" id="submitBtn" class="btn-submit">Submit Feedback</button>
                    </div>

                    <div id="formStatus" class="form-status-msg"></div>
                </form>
            </div>

        </main>

        <script src="script.js" defer></script>
        
        <footer class="footer">
            © 2026 CookSmart Hub. All rights reserved.
        </footer>
    </body>
</html>
